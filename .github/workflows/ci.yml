name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    container: archlinux/archlinux:base-devel

    steps:
      - uses: actions/checkout@v7

      - name: Update system and install build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed rust cargo nasm mpv openssl

      - name: Cache Rust build
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-ci-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-ci-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Build release binaries
        run: cargo build --release

  audit:
    runs-on: ubuntu-latest
    container: archlinux/archlinux:base-devel

    steps:
      - uses: actions/checkout@v7

      - name: Update system and install cargo-audit dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed rust cargo openssl pkgconf

      - name: Cache Cargo audit
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-audit
          key: ${{ runner.os }}-cargo-audit-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-audit-

      - name: Install cargo-audit
        run: test -x ~/.cargo/bin/cargo-audit || cargo install cargo-audit --locked

      - name: Run cargo audit
        run: ~/.cargo/bin/cargo-audit

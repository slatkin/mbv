name: PKGBUILD

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux/archlinux:base-devel
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Update system and install makedeps
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed rust cargo nasm mpv openssl github-cli git

      - name: Build binary
        run: cargo build --release

      - name: Bundle release tarball
        run: |
          PKGVER=$(grep '^pkgver=' PKGBUILD | cut -d= -f2)
          DIST="mby-${PKGVER}"
          mkdir -p "${DIST}"
          cp target/release/mby "${DIST}/"
          cp scripts/mby.lua "${DIST}/"
          cp fonts/Material-Design-Iconic-Font.ttf "${DIST}/"
          cp dist/config.toml "${DIST}/"
          tar czf "${DIST}-linux-x86_64.tar.gz" "${DIST}"
          echo "TARBALL=${DIST}-linux-x86_64.tar.gz" >> "$GITHUB_ENV"
          echo "PKGVER=${PKGVER}" >> "$GITHUB_ENV"

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release upload "v${PKGVER}" "${TARBALL}" --clobber

      - name: Update PKGBUILD sha256 on main
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA256=$(sha256sum "${TARBALL}" | cut -d' ' -f1)
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}" /tmp/repo
          cd /tmp/repo
          sed -i "s/^pkgver=.*/pkgver=${PKGVER}/" PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('${SHA256}')/" PKGBUILD
          git add PKGBUILD
          git diff --staged --quiet || git commit -m "Release v${PKGVER}: update PKGBUILD sha256"
          git push origin main

      - name: Push to AUR
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          mkdir -p /root/.ssh
          echo "$AUR_SSH_KEY" > /root/.ssh/aur
          chmod 600 /root/.ssh/aur
          export GIT_SSH_COMMAND="ssh -i /root/.ssh/aur -o StrictHostKeyChecking=accept-new"
          git config --global --add safe.directory '*'
          git clone ssh://aur@aur.archlinux.org/mby.git /tmp/aur-mby
          cp /tmp/repo/PKGBUILD /tmp/aur-mby/PKGBUILD
          useradd -m aurbuild
          chown -R aurbuild /tmp/aur-mby
          su -c 'cd /tmp/aur-mby && makepkg --printsrcinfo' aurbuild > /tmp/aur-mby/.SRCINFO
          cd /tmp/aur-mby
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD .SRCINFO
          git diff --staged --quiet || git commit -m "Release v${PKGVER}"
          git push

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mby-linux-x86_64
          path: "*.tar.gz"
          if-no-files-found: error

name: PKGBUILD

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux/archlinux:base-devel
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - name: Update system and install makedeps
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed rust cargo nasm mpv openssl github-cli git openssh

      - name: Cache Rust build
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-deb
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Set version from tag
        run: |
          PKGVER=${GITHUB_REF_NAME#v}
          if [[ "$PKGVER" == "main" || "$PKGVER" == "$GITHUB_REF_NAME" ]]; then
            PKGVER=$(grep '^pkgver=' PKGBUILD | cut -d= -f2)
          fi
          sed -i "s/^version = \".*\"/version = \"${PKGVER}\"/" Cargo.toml
          echo "PKGVER=${PKGVER}" >> "$GITHUB_ENV"

      - name: Build and test
        run: cargo test --release && cargo build --release

      - name: Bundle release tarball
        run: |
          DIST="mbv-${PKGVER}"
          mkdir -p "${DIST}"
          cp target/release/mbv "${DIST}/"
          cp scripts/mbv.lua "${DIST}/"
          cp fonts/Material-Design-Iconic-Font.ttf "${DIST}/"
          cp dist/config.toml "${DIST}/"
          tar czf "${DIST}-linux-x86_64.tar.gz" "${DIST}"
          echo "TARBALL=${DIST}-linux-x86_64.tar.gz" >> "$GITHUB_ENV"
          echo "PKGVER=${PKGVER}" >> "$GITHUB_ENV"

      - name: Build .deb package
        run: |
          test -x ~/.cargo/bin/cargo-deb || cargo install cargo-deb --locked
          cargo deb --no-build --deb-version "${PKGVER}"
          DEB=$(ls target/debian/mbv_*.deb | head -1)
          echo "DEB=${DEB}" >> "$GITHUB_ENV"

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release view "v${PKGVER}" > /dev/null 2>&1 || \
            gh release create "v${PKGVER}" --title "v${PKGVER}" --generate-notes
          gh release upload "v${PKGVER}" "${TARBALL}" --clobber
          gh release upload "v${PKGVER}" "${DEB}" --clobber
          gh release edit "v${PKGVER}" --draft=false

      - name: Update PKGBUILD sha256 on main
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA256=$(sha256sum "${TARBALL}" | cut -d' ' -f1)
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}" /tmp/repo
          cd /tmp/repo
          sed -i "s/^pkgver=.*/pkgver=${PKGVER}/" PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('${SHA256}')/" PKGBUILD
          git add PKGBUILD
          git diff --staged --quiet || git commit -m "Release v${PKGVER}: update PKGBUILD sha256"
          git push origin main

      - name: Push to AUR
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          mkdir -p /root/.ssh
          echo "$AUR_SSH_KEY" | tr -d '\r' > /root/.ssh/aur
          chmod 600 /root/.ssh/aur
          export GIT_SSH_COMMAND="ssh -i /root/.ssh/aur -o StrictHostKeyChecking=accept-new"
          git config --global --add safe.directory '*'
          git clone ssh://aur@aur.archlinux.org/mbv.git /tmp/aur-mbv
          cp /tmp/repo/PKGBUILD /tmp/aur-mbv/PKGBUILD
          useradd -m aurbuild
          chown -R aurbuild /tmp/aur-mbv
          su -c 'cd /tmp/aur-mbv && makepkg --printsrcinfo' aurbuild > /tmp/aur-mbv/.SRCINFO
          cd /tmp/aur-mbv
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD .SRCINFO
          git diff --staged --quiet || git commit -m "Release v${PKGVER}"
          git push

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: mbv-linux-x86_64
          path: |
            *.tar.gz
            target/debian/*.deb
          if-no-files-found: error

name: PKGBUILD

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux/archlinux:base-devel

    steps:
      - uses: actions/checkout@v4

      - name: Update system and install makedeps
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed rust cargo nasm mpv openssl

      - name: Build package
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          cp -rT . /home/builder/pkg
          chown -R builder:builder /home/builder/pkg
          su builder -c "cd /home/builder/pkg && makepkg --nodeps --noconfirm"
          cp /home/builder/pkg/*.pkg.tar.zst .

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: mby-pkg
          path: "*.pkg.tar.zst"
          if-no-files-found: error

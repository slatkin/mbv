name: PKGBUILD

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux/archlinux:base-devel

    steps:
      - uses: actions/checkout@v4

      - name: Update system and install makedeps
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed rust cargo nasm mpv openssl github-cli git

      - name: Build binary
        run: cargo build --release

      - name: Bundle release tarball
        run: |
          PKGVER=$(grep '^pkgver=' PKGBUILD | cut -d= -f2)
          DIST="mby-${PKGVER}"
          mkdir -p "${DIST}"
          cp target/release/mby "${DIST}/"
          cp scripts/mby.lua "${DIST}/"
          cp fonts/Material-Design-Iconic-Font.ttf "${DIST}/"
          cp dist/config.toml "${DIST}/"
          tar czf "${DIST}-linux-x86_64.tar.gz" "${DIST}"
          echo "TARBALL=${DIST}-linux-x86_64.tar.gz" >> "$GITHUB_ENV"
          echo "PKGVER=${PKGVER}" >> "$GITHUB_ENV"

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${PKGVER}" "${TARBALL}" --clobber

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mby-linux-x86_64
          path: "*.tar.gz"
          if-no-files-found: error
